<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Package</title>

<link
rel="stylesheet"
href="/legacy/legacy.css"
>

</head>

<body>

<div class="panel">

<div class="box">

<div
class="infoBox"
style="margin-bottom:0;"
>

<div
id="title"
class="title"
>
Loading...
</div>

<div class="subtitle">
Package Information
</div>

</div>

<div
class="button"
style="
height:auto;
padding-top:12px;
padding-bottom:12px;
display:block;
"
>

<div
style="
font-size:13px;
font-weight:bold;
margin-bottom:5px;
color:#000;
"
>
Bundle ID
</div>

<div
id="bundle"
style="
font-size:14px;
color:#666;
"
>
</div>

</div>

<div
class="button"
style="
height:auto;
padding-top:12px;
padding-bottom:12px;
display:block;
"
>

<div
style="
font-size:13px;
font-weight:bold;
margin-bottom:5px;
color:#000;
"
>
Price
</div>

<div
id="price"
style="
font-size:16px;
font-weight:bold;
color:#2d7c2d;
"
>
</div>

</div>

<div id="button">
</div>

</div>

<div class="footer">

by sn0wcode

</div>

</div>

<script>

var pkg = null

function getQuery(name) {

  var match =
    RegExp(
      '[?&]' +
      name +
      '=([^&]*)'
    ).exec(
      window.location.search
    )

  return match &&
    decodeURIComponent(
      match[1]
    )

}

var packageId =
  getQuery("id")

var uid =
  localStorage.getItem(
    "legacy_uid"
  )

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-package",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          alert(
            "Package not found"
          )

          return

        }

        pkg =
          data.package

        document.getElementById(
          "title"
        ).innerHTML =
          pkg.name

        document.getElementById(
          "bundle"
        ).innerHTML =
          pkg.bundle_id

        document.getElementById(
          "price"
        ).innerHTML =
          "$" + pkg.price

        if (
          !pkg.is_paid
        ) {

          document.getElementById(
            "button"
          ).innerHTML =

          '<a href="#" onclick="installPackage()" class="button">' +

          '<div class="buttonLeft">' +

          '<div class="buttonText">Install Package</div>' +

          '</div>' +

          '<img src="/arrow.png" class="arrow">' +

          '</a>'

        } else if (
          data.owned
        ) {

          document.getElementById(
            "button"
          ).innerHTML =

          '<a href="#" onclick="installPackage()" class="button">' +

          '<div class="buttonLeft">' +

          '<div class="buttonText">Install Package</div>' +

          '</div>' +

          '<img src="/arrow.png" class="arrow">' +

          '</a>'

        } else {

          document.getElementById(
            "button"
          ).innerHTML =

          '<a href="#" onclick="purchase()" class="button">' +

          '<div class="buttonLeft">' +

          '<div class="buttonText">Purchase Package</div>' +

          '</div>' +

          '<img src="/arrow.png" class="arrow">' +

          '</a>'

        }

      } catch (e) {

        alert(
          "Error loading package"
        )

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid,
    bundle_id: packageId
  })
)

function purchase() {

  if (!uid) {

    window.location =
      "/legacy/login.html"

    return

  }

  var xhr =
    new XMLHttpRequest()

  xhr.open(
    "POST",
    "/api/stripe/create-checkout",
    true
  )

  xhr.setRequestHeader(
    "Content-Type",
    "application/json"
  )

  xhr.onreadystatechange =
    function () {

      if (
        xhr.readyState == 4
      ) {

        try {

          var data =
            JSON.parse(
              xhr.responseText
            )

          if (
            !data.success
          ) {

            alert(
              data.error ||
              "Checkout failed"
            )

            return

          }

          window.location =
            data.url

        } catch (e) {

          alert(
            "Stripe checkout error"
          )

        }

      }

    }

  xhr.send(
    JSON.stringify({

      package_id:
        pkg.bundle_id

    })
  )

}

function installPackage() {

  window.location =

    "/legacy/download.html?id=" +
    pkg.id

}

</script>

</body>

</html>
