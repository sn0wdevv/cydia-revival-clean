<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Login</title>

<link
rel="stylesheet"
href="/legacy/legacy.css"
>

</head>

<body>

<div class="panel">

<div class="infoBox">

<div class="title">
Sign In
</div>

<div class="subtitle">
Login with your Cydia account
</div>

<input
id="email"
type="text"
placeholder="Email"
class="legacyInput"
>

<input
id="password"
type="password"
placeholder="Password"
class="legacyInput"
>

<a
href="#"
onclick="login()"
class="button"
>

<div class="buttonLeft">

<div class="buttonText">
Login
</div>

</div>

<img
src="/arrow.png"
class="arrow"
>

</a>

<a
href="/legacy/register.html"
class="button"
>

<div class="buttonLeft">

<div class="buttonText">
Create Account
</div>

</div>

<img
src="/arrow.png"
class="arrow"
>

</a>

<div class="footer">

by sn0wcode

</div>

</div>

</div>

<script>

function login() {

  var email =
    document.getElementById(
      "email"
    ).value

  var password =
    document.getElementById(
      "password"
    ).value

  var xhr =
    new XMLHttpRequest()

  xhr.open(
    "POST",
    "/api/legacy-login",
    true
  )

  xhr.setRequestHeader(
    "Content-Type",
    "application/json"
  )

  xhr.onreadystatechange =
    function () {

      if (
        xhr.readyState == 4
      ) {

        try {

          var data =
            JSON.parse(
              xhr.responseText
            )

          if (
            !data.success
          ) {

            alert(
              "Login failed"
            )

            return
          }

          localStorage.setItem(
            "legacy_uid",
            data.uid
          )

          window.location =
            "/legacy/account.html"

        } catch (e) {

          alert(
            "Error"
          )

        }

      }

    }

  xhr.send(
    JSON.stringify({
      email: email,
      password: password
    })
  )

}

</script>

</body>

</html>
