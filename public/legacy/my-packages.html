<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>My Packages</title>

<link
rel="stylesheet"
href="/legacy/legacy.css"
>

</head>

<body>

<div class="panel">

<div class="box">

<div
class="infoBox"
style="margin-bottom:0;"
>

<div class="title">
My Packages
</div>

<div class="subtitle">
Packages uploaded to the repo
</div>

</div>

<div id="packages">

<div
class="button"
>

<div class="buttonLeft">

<div class="buttonText">
Loading...
</div>

</div>

</div>

</div>

</div>

<div class="footer">

by sn0wcode

</div>

</div>

<script>

var uid =
  localStorage.getItem(
    "legacy_uid"
  )

if (!uid) {

  window.location =
    "/legacy/login.html"

}

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-my-packages",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          alert(
            "Failed"
          )

          return

        }

        var html = ""

        if (
          data.packages.length == 0
        ) {

          html =

            '<div class="button">' +

            '<div class="buttonLeft">' +

            '<div class="buttonText">No packages uploaded</div>' +

            '</div>' +

            '</div>'

        }

        for (
          var i = 0;
          i <
          data.packages.length;
          i++
        ) {

          var pkg =
            data.packages[i]

          html +=

            '<div class="button" style="height:auto;padding-top:12px;padding-bottom:12px;display:block;">' +

            '<div style="font-size:18px;font-weight:bold;color:black;text-shadow:0 1px 0 rgba(255,255,255,0.8);margin-bottom:4px;">' +

            pkg.name +

            '</div>' +

            '<div style="font-size:12px;color:#666;margin-bottom:6px;">' +

            pkg.bundle_id +

            '</div>' +

            '<div style="color:#2d7c2d;font-weight:bold;font-size:15px;">$' +

            pkg.price +

            '</div>' +

            '</div>'

        }

        document.getElementById(
          "packages"
        ).innerHTML =
          html

      } catch (e) {

        alert(
          "Error"
        )

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid
  })
)

</script>

</body>

</html>
