<script>

var uid =
  localStorage.getItem(
    "legacy_uid"
  )

if (!uid) {

  window.location =
    "/legacy/login.html"

}

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-account",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          window.location =
            "/legacy/login.html"

          return

        }

        document.getElementById(
          "username"
        ).innerHTML =
          data.username

        document.getElementById(
          "email"
        ).innerHTML =
          data.email

      } catch (e) {

        alert(
          "Account error"
        )

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid
  })
)

function logout() {

  localStorage.removeItem(
    "legacy_uid"
  )

  window.location =
    "/legacy/login.html"

}

</script>
