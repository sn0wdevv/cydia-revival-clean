<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Purchases</title>

<link
rel="stylesheet"
href="/legacy/legacy.css"
>

</head>

<body>

<div class="panel">

<div class="box">

<div
class="infoBox"
style="margin-bottom:0;"
>

<div class="title">
Installable Purchases
</div>

<div class="subtitle">
Purchased packages linked to your account
</div>

</div>

<div id="packages">

<div
class="button"
>

<div class="buttonLeft">

<div class="buttonText">
Loading...
</div>

</div>

</div>

</div>

</div>

<div class="footer">

by sn0wcode

</div>

</div>

<script>

var uid =
  localStorage.getItem(
    "legacy_uid"
  )

if (!uid) {

  window.location =
    "/legacy/login.html"

}

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-purchases",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          alert(
            "Failed"
          )

          return
        }

        var html = ""

        if (
          data.purchases.length == 0
        ) {

          html =

            '<div class="button">' +

            '<div class="buttonLeft">' +

            '<div class="buttonText">No purchases</div>' +

            '</div>' +

            '</div>'

        }

        for (
          var i = 0;
          i <
          data.purchases.length;
          i++
        ) {

          var pkg =
            data.purchases[i]

          html +=

            '<a href="/legacy/package.html?id=' +

            pkg.package_id +

            '" class="button">' +

            '<div class="buttonLeft">' +

            '<div class="buttonText">' +

            pkg.package_name +

            '</div>' +

            '</div>' +

            '<img src="/arrow.png" class="arrow">' +

            '</a>'

        }

        document.getElementById(
          "packages"
        ).innerHTML =
          html

      } catch (e) {

        alert(
          "Error"
        )

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid
  })
)

</script>

</body>

</html>
