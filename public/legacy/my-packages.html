<!DOCTYPE html>

<html>

<head>
  <meta charset="UTF-8">
  <title>My Packages</title>
</head>

<body
  style="
    background:#c5ccd4;
    font-family:Helvetica;
    padding:20px;
  "
>

<div
  style="
    max-width:400px;
    margin:0 auto;
    background:#f2f2f2;
    border:1px solid #999;
    border-radius:8px;
    overflow:hidden;
  "
>

<div
  style="
    background:#2d4f7c;
    color:white;
    padding:12px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
  "
>
My Packages
</div>

<div
  id="packages"
  style="padding:0;"
>

<div
  style="
    padding:15px;
  "
>
Loading...
</div>

</div>

</div>

<script>

var uid =
  localStorage.getItem(
    "legacy_uid"
  )

if (!uid) {

  window.location =
    "/legacy/login.html"

}

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-my-packages",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          alert(
            "Failed"
          )

          return
        }

        var html = ""

        if (
          data.packages.length == 0
        ) {

          html =
            '<div style="padding:15px;">No packages uploaded.</div>'

        }

        for (
          var i = 0;
          i <
          data.packages.length;
          i++
        ) {

          var pkg =
            data.packages[i]

          html +=

          '<div style="padding:15px;border-bottom:1px solid #ccc;background:white;">' +

          '<div style="font-weight:bold;color:black;margin-bottom:4px;">' +

          pkg.name +

          '</div>' +

          '<div style="font-size:12px;color:#666;margin-bottom:6px;">' +

          pkg.bundle_id +

          '</div>' +

          '<div style="color:#2d7c2d;font-weight:bold;">$' +

          pkg.price +

          '</div>' +

          '</div>'

        }

        document.getElementById(
          "packages"
        ).innerHTML =
          html

      } catch (e) {

        alert(
          "Error"
        )

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid
  })
)

</script>

</body>
</html>
