<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Purchase Package</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<link
rel="stylesheet"
href="/legacy/legacy.css"
>

</head>

<body>

<div class="panel">

<div class="box">

<div
class="infoBox"
style="margin-bottom:0;"
>

<div class="title">
Purchase Package
</div>

<div class="subtitle">
Purchase and install package
</div>

<div
id="packageName"
style="
font-size:18px;
font-weight:bold;
margin-top:10px;
"
>
Loading...
</div>

</div>

<a
href="#"
onclick="buyPackage()"
class="button"
id="buyButton"

>

<div class="buttonLeft">

<div class="buttonText">
Buy Package
</div>

</div>

<img
src="/arrow.png"
class="arrow"

>

</a>

<div
id="qrcode"
style="
padding:20px;
text-align:center;
background:#f6f6f6;
"
>
</div>

</div>

<div class="footer">

Compatible with iOS 6 <br>
by sn0wcode

</div>

</div>

<script>

var currentPackageId =
  "";

function getParameterByName(name) {

  var regex =
    new RegExp(
      "[\\?&]" +
      name +
      "=([^&#]*)"
    );

  var results =
    regex.exec(
      location.search
    );

  return results === null
    ? ""
    : decodeURIComponent(
        results[1].replace(
          /\+/g,
          " "
        )
      );

}

window.onload = function() {

  currentPackageId =
    getParameterByName(
      "package"
    );

  if(
    currentPackageId == ""
  ) {

    currentPackageId =
      "unknown.package";

  }

  document.getElementById(
    "packageName"
  ).innerHTML =
    currentPackageId;

};

function buyPackage() {

  document.getElementById(
    "buyButton"
  ).innerHTML =

    '<div class="buttonLeft"><div class="buttonText">Generating QR...</div></div>';

  var xhr =
    new XMLHttpRequest();

  xhr.open(
    "POST",
    "/api/stripe/create-checkout",
    true
  );

  xhr.setRequestHeader(
    "Content-Type",
    "application/json"
  );

  xhr.onreadystatechange =
    function() {

    if(
      xhr.readyState == 4
    ) {

      if(
        xhr.status == 200
      ) {

        var data =
          JSON.parse(
            xhr.responseText
          );

        console.log(data);

        if(
          data.success &&
          data.url
        ) {

          document.getElementById(
            "qrcode"
          ).innerHTML = "";

          new QRCode(

            document.getElementById(
              "qrcode"
            ),

            {

              text:
                data.url,

              width: 220,

              height: 220

            }

          );

          document.getElementById(
            "buyButton"
          ).innerHTML =

            '<div class="buttonLeft"><div class="buttonText">Scan QR To Pay</div></div>';

        } else {

          alert(
            "Stripe URL missing"
          );

          document.getElementById(
            "buyButton"
          ).innerHTML =

            '<div class="buttonLeft"><div class="buttonText">Buy Package</div></div>';

        }

      } else {

        console.log(
          xhr.responseText
        );

        alert(
          "Checkout failed"
        );

        document.getElementById(
          "buyButton"
        ).innerHTML =

            '<div class="buttonLeft"><div class="buttonText">Buy Package</div></div>';

      }

    }

  };

  xhr.send(
    JSON.stringify({

      package_id:
        currentPackageId

    })
  );

}

</script>

</body>

</html>
