<!DOCTYPE html>

<html>

<head>
  <meta charset="UTF-8">
  <title>Purchase Complete</title>
</head>

<body
  style="
    background:#c5ccd4;
    font-family:Helvetica;
    padding:20px;
  "
>

<div
  style="
    max-width:400px;
    margin:0 auto;
    background:#f2f2f2;
    border:1px solid #999;
    border-radius:8px;
    overflow:hidden;
  "
>

<div
  style="
    background:#2d7c2d;
    color:white;
    padding:12px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
  "
>
Purchase Complete
</div>

<div
  id="status"
  style="
    padding:20px;
    text-align:center;
    color:#000;
  "
>
Processing purchase...
</div>

</div>

<script>

function getQuery(name) {

  var match =
    RegExp(
      '[?&]' +
      name +
      '=([^&]*)'
    ).exec(
      window.location.search
    )

  return match &&
    decodeURIComponent(
      match[1]
    )

}

var uid =
  getQuery("uid")

var packageId =
  getQuery("package")

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-complete-purchase",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          document.getElementById(
            "status"
          ).innerHTML =
            "Purchase failed"

          return

        }

        document.getElementById(
          "status"
        ).innerHTML =

        'Purchase completed successfully.<br><br><a href="/legacy/purchases.html">View Purchases</a>'

      } catch (e) {

        document.getElementById(
          "status"
        ).innerHTML =
          "Error"

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid,
    package_id:
      packageId
  })
)

</script>

</body>
</html>
