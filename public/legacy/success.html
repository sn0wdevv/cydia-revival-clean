<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Purchase Complete</title>

<link
rel="stylesheet"
href="/legacy/legacy.css"
>

</head>

<body>

<div class="panel">

<div class="box">

<div
class="infoBox"
style="margin-bottom:0;"
>

<div
class="title"
style="color:#2d7c2d;"
>
Purchase Complete
</div>

<div class="subtitle">
Finishing your purchase
</div>

</div>

<div
id="status"
class="button"
style="
justify-content:center;
font-size:18px;
font-weight:bold;
height:70px;
"
>

<div class="buttonText">

Processing purchase...

</div>

</div>

</div>

<div class="footer">

by sn0wcode

</div>

</div>

<script>

function getQuery(name) {

  var match =
    RegExp(
      '[?&]' +
      name +
      '=([^&]*)'
    ).exec(
      window.location.search
    )

  return match &&
    decodeURIComponent(
      match[1]
    )

}

var uid =
  getQuery("uid")

var packageId =
  getQuery("package")

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-complete-purchase",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          document.getElementById(
            "status"
          ).innerHTML =

            '<div class="buttonText" style="color:#aa2222;">Purchase failed</div>'

          return

        }

        document.getElementById(
          "status"
        ).innerHTML =

          '<a href="/legacy/purchases.html" class="button" style="border:none;height:auto;justify-content:space-between;width:100%;">' +

          '<div class="buttonLeft">' +

          '<div class="buttonText">View Purchases</div>' +

          '</div>' +

          '<img src="/arrow.png" class="arrow">' +

          '</a>'

      } catch (e) {

        document.getElementById(
          "status"
        ).innerHTML =

          '<div class="buttonText" style="color:#aa2222;">Error</div>'

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid,
    package_id:
      packageId
  })
)

</script>

</body>

</html>
