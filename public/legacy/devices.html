<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Devices</title>

<link
rel="stylesheet"
href="/legacy/legacy.css"
>

</head>

<body>

<div class="panel">

<div class="box">

<div
class="infoBox"
style="margin-bottom:0;"
>

<div class="title">
Linked Devices
</div>

<div class="subtitle">
Devices associated with your account
</div>

</div>

<div id="devices">

<div
class="button"
>

<div class="buttonLeft">

<div class="buttonText">
Loading...
</div>

</div>

</div>

</div>

</div>

<div class="footer">

by sn0wcode

</div>

</div>

<script>

var uid =
  localStorage.getItem(
    "legacy_uid"
  )

if (!uid) {

  window.location =
    "/legacy/login.html"

}

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-devices",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          alert(
            "Failed"
          )

          return
        }

        var html = ""

        if (
          data.devices.length == 0
        ) {

          html =

            '<div class="button">' +

            '<div class="buttonLeft">' +

            '<div class="buttonText">No linked devices</div>' +

            '</div>' +

            '</div>'

        }

        for (
          var i = 0;
          i <
          data.devices.length;
          i++
        ) {

          var device =
            data.devices[i]

          html +=

            '<div class="button" style="height:auto;padding-top:12px;padding-bottom:12px;display:block;">' +

            '<div style="font-size:18px;font-weight:bold;color:black;text-shadow:0 1px 0 rgba(255,255,255,0.8);">' +

            (device.device_name ||
            "Unknown Device") +

            '</div>' +

            '<div style="font-size:12px;color:#666;margin-top:5px;">' +

            device.device_uuid +

            '</div>' +

            '</div>'

        }

        document.getElementById(
          "devices"
        ).innerHTML =
          html

      } catch (e) {

        alert(
          "Error"
        )

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid
  })
)

</script>

</body>

</html>
