<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Create Account</title>

<link
rel="stylesheet"
href="/legacy/legacy.css"
>

</head>

<body>

<div class="panel">

<div class="box">

<div
class="infoBox"
style="margin-bottom:0;"
>

<div class="title">
Create Account
</div>

<div class="subtitle">
Register a new account
</div>

</div>

<div style="padding:14px;">

<input
id="username"
type="text"
placeholder="Username"
class="legacyInput"

>

<input
id="email"
type="text"
placeholder="Email"
class="legacyInput"

>

<input
id="password"
type="password"
placeholder="Password"
class="legacyInput"

>

<a
href="#"
onclick="register()"
class="button"

>

<div class="buttonLeft">

<div class="buttonText">
Register
</div>

</div>

<img
src="/arrow.png"
class="arrow"

>

</a>

<a
href="/legacy/login.html"
class="button"

>

<div class="buttonLeft">

<div class="buttonText">
Already have an account?
</div>

</div>

<img
src="/arrow.png"
class="arrow"

>

</a>

</div>

</div>

<div class="footer">

by sn0wcode

</div>

</div>

<script>

function register() {

  var username =
    document.getElementById(
      "username"
    ).value

  var email =
    document.getElementById(
      "email"
    ).value

  var password =
    document.getElementById(
      "password"
    ).value

  var xhr =
    new XMLHttpRequest()

  xhr.open(
    "POST",
    "/api/legacy-register",
    true
  )

  xhr.setRequestHeader(
    "Content-Type",
    "application/json"
  )

  xhr.onreadystatechange =
    function () {

      if (
        xhr.readyState == 4
      ) {

        try {

          var data =
            JSON.parse(
              xhr.responseText
            )

          if (
            !data.success
          ) {

            alert(
              "Register failed"
            )

            return
          }

          localStorage.setItem(
            "legacy_uid",
            data.uid
          )

          window.location =
            "/legacy/account.html"

        } catch (e) {

          alert(
            "Error"
          )

        }

      }

    }

  xhr.send(
    JSON.stringify({
      username: username,
      email: email,
      password: password
    })
  )

}

</script>

</body>

</html>
