<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Purchase Package</title>

<style>

body {

  background:#c5ccd4;
  font-family:Helvetica;
  padding:20px;

}

.box {

  max-width:400px;
  margin:0 auto;
  background:#f2f2f2;
  border:1px solid #999;
  border-radius:8px;
  overflow:hidden;

}

.title {

  background:#2d4f7c;
  color:white;
  padding:12px;
  text-align:center;
  font-size:22px;
  font-weight:bold;

}

.content {

  padding:15px;

}

.package {

  background:white;
  border:1px solid #ccc;
  border-radius:6px;
  padding:14px;
  margin-bottom:15px;

}

.button {

  display:block;
  background:#2d4f7c;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:14px;
  border-radius:6px;
  font-size:18px;

}

.footer {

  text-align:center;
  margin-top:20px;
  font-size:13px;
  color:#666;

}

</style>

<script>

function getParameterByName(name) {

  var match = RegExp('[?&]' + name + '=([^&]*)')
    .exec(window.location.search);

  return match && decodeURIComponent(match[1].replace(/\+/g, ' '));

}

window.onload = function() {

  var packageId = getParameterByName('package');

  if(packageId) {

    document.getElementById('packageName').innerHTML = packageId;

  } else {

    document.getElementById('packageName').innerHTML = 'Unknown Package';

  }

}

</script>

</head>

<body>

<div class="box">

<div class="title">
Purchase Package
</div>

<div class="content">

<div class="package">

<div id="packageName">
Loading...
</div>

</div>

<a
class="button"
href="#"
id="buyButton"

>

Buy Package

</a>

<div class="footer">

Compatible with iOS 6 <br>
by sn0wcode

</div>

</div>

</div>

</body>

</html>
