<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Download Package</title>

<link
rel="stylesheet"
href="/legacy/legacy.css"
>

</head>

<body>

<div class="panel">

<div class="box">

<div
class="infoBox"
style="margin-bottom:0;"
>

<div class="title">
Download Package
</div>

<div class="subtitle">
Checking package ownership
</div>

</div>

<div
id="status"
class="button"
style="
justify-content:center;
font-size:18px;
font-weight:bold;
"
>

<div class="buttonText">

Checking ownership...

</div>

</div>

</div>

<div class="footer">

by sn0wcode

</div>

</div>

<script>

function getQuery(name) {

  var match =
    RegExp(
      '[?&]' +
      name +
      '=([^&]*)'
    ).exec(
      window.location.search
    )

  return match &&
    decodeURIComponent(
      match[1]
    )

}

var uid =
  localStorage.getItem(
    "legacy_uid"
  )

if (!uid) {

  window.location =
    "/legacy/login.html"

}

var packageId =
  getQuery("id")

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-download",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          document.getElementById(
            "status"
          ).innerHTML =

            '<div class="buttonText" style="color:#aa2222;">You do not own this package.</div>'

          return

        }

        document.getElementById(
          "status"
        ).innerHTML =

          '<div class="buttonText">Starting download...</div>'

        window.location =
          data.download_url

      } catch (e) {

        document.getElementById(
          "status"
        ).innerHTML =

          '<div class="buttonText" style="color:#aa2222;">Error</div>'

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid,
    package_id:
      packageId
  })
)

</script>

</body>

</html>
