<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Purchase Package</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body {

  background:#c5ccd4;
  font-family:Helvetica;
  padding:20px;

}

.box {

  max-width:400px;
  margin:0 auto;
  background:#f2f2f2;
  border:1px solid #999;
  border-radius:8px;
  overflow:hidden;

}

.title {

  background:#2d4f7c;
  color:white;
  padding:12px;
  text-align:center;
  font-size:22px;
  font-weight:bold;

}

.content {

  padding:15px;

}

.package {

  background:white;
  border:1px solid #ccc;
  border-radius:6px;
  padding:14px;
  margin-bottom:15px;

}

.button {

  display:block;
  width:100%;
  background:#2d4f7c;
  color:white;
  text-align:center;
  padding:14px;
  border-radius:6px;
  font-size:18px;
  border:none;
  cursor:pointer;

}

#qrcode {

  margin-top:20px;
  text-align:center;

}

#qrcode img {

  margin:0 auto;

}

.footer {

  text-align:center;
  margin-top:20px;
  font-size:13px;
  color:#666;

}

</style>

<script>

function getParameterByName(name) {

  var regex =
    new RegExp(
      "[\\?&]" +
      name +
      "=([^&#]*)"
    );

  var results =
    regex.exec(
      location.search
    );

  return results === null
    ? ""
    : decodeURIComponent(
        results[1].replace(
          /\+/g,
          " "
        )
      );

}

window.onload = function() {

  var packageId =
    getParameterByName(
      "package"
    );

  if(packageId == "") {

    packageId =
      "Unknown Package";

  }

  document.getElementById(
    "packageName"
  ).innerHTML =
    packageId;

};

function buyPackage() {

  document.getElementById(
    "buyButton"
  ).innerHTML =
    "Generating QR...";

  var xhr =
    new XMLHttpRequest();

  xhr.open(
    "POST",
    "/api/stripe/create-checkout",
    true
  );

  xhr.setRequestHeader(
    "Content-Type",
    "application/json"
  );

  xhr.onreadystatechange =
    function() {

    if(
      xhr.readyState == 4
    ) {

      if(
        xhr.status == 200
      ) {

        var data =
          JSON.parse(
            xhr.responseText
          );

        if(
          data.url
        ) {

          document.getElementById(
            "qrcode"
          ).innerHTML = "";

          new QRCode(

            document.getElementById(
              "qrcode"
            ),

            {

              text:
                data.url,

              width: 220,

              height: 220

            }

          );

          document.getElementById(
            "buyButton"
          ).innerHTML =
            "Scan QR To Pay";

        } else {

          alert(
            "Stripe URL missing"
          );

          document.getElementById(
            "buyButton"
          ).innerHTML =
            "Buy Package";

        }

      } else {

        alert(
          "Checkout failed"
        );

        document.getElementById(
          "buyButton"
        ).innerHTML =
          "Buy Package";

      }

    }

  };

  xhr.send(
    JSON.stringify({

      package_id:
        "f1d75f0f-9510-4193-ac2e-5c4b8a05776b"

    })
  );

}

</script>

</head>

<body>

<div class="box">

<div class="title">
Purchase Package
</div>

<div class="content">

<div class="package">

<div id="packageName">
Loading...
</div>

</div>

<button
class="button"
onclick="buyPackage()"
id="buyButton"
type="button"
>

Buy Package

</button>

<div id="qrcode">
</div>

<div class="footer">

Compatible with iOS 6
<br>
by sn0wcode

</div>

</div>

</div>

</body>

</html>
