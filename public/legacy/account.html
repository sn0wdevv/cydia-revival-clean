<body>

style="

font-size:14px;
margin-bottom:14px;
"
>
</div>

</div>

<a
href="/legacy/purchases.html"
class="button"

>

<div class="buttonLeft">

<div class="buttonText">
Installable Purchases
</div>

</div>

<img
src="/arrow.png"
class="arrow"

>

</a>

<a
href="/legacy/devices.html"
class="button"

>

<div class="buttonLeft">

<div class="buttonText">
Linked Devices
</div>

</div>

<img
src="/arrow.png"
class="arrow"

>

<a

color:#aa2222;
"

>

</div>

</div>

</div>

<script>

var uid =
  localStorage.getItem(
    "legacy_uid"
  )

if (!uid) {

  window.location =
    "/legacy/login.html"

}

var xhr =
  new XMLHttpRequest()

xhr.open(
  "POST",
  "/api/legacy-account",
  true
)

xhr.setRequestHeader(
  "Content-Type",
  "application/json"
)

xhr.onreadystatechange =
  function () {

    if (
      xhr.readyState == 4
    ) {

      try {

        var data =
          JSON.parse(
            xhr.responseText
          )

        if (
          !data.success
        ) {

          window.location =
            "/legacy/login.html"

          return

        }

        document.getElementById(
          "username"
        ).innerHTML =
          data.username

        document.getElementById(
          "email"
        ).innerHTML =
          data.email

      } catch (e) {

        alert(
          "Account error"
        )

      }

    }

  }

xhr.send(
  JSON.stringify({
    uid: uid
  })
)

function logout() {

  localStorage.removeItem(
    "legacy_uid"
  )

  window.location =
    "/legacy/login.html"

}

</script>

</body>

</html>
